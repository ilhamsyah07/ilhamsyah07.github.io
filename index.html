    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0a0c10;
      --surface: #0f1219;
      --card:    #141820;
      --border:  #1e2535;
      --accent:  #00d4ff;
      --accent2: #7c3aed;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --green:   #10b981;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Sora', sans-serif; line-height: 1.6; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(10,12,16,.93); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner { max-width: 85%; margin: 0 auto; padding: .85rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { font-family: 'Space Mono',monospace; font-size: 13px; color: var(--accent); letter-spacing: 2px; text-decoration: none; }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a { font-size: 11px; color: var(--muted); text-decoration: none; letter-spacing: 1px; text-transform: uppercase; transition: color .2s; }
    .nav-links a:hover { color: var(--accent); }

    .site { max-width: 85%; margin: 0 auto; padding: 0 1.5rem; }

    .section-label {
      font-family: 'Space Mono',monospace; font-size: 11px; color: var(--accent);
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 1.75rem;
      display: flex; align-items: center; gap: .75rem;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    section { padding: 4rem 0; }

    .hero { display: grid; grid-template-columns: 1fr auto; gap: 2.5rem; align-items: center; padding: 5rem 0 3rem; }
    .hero-badge {
      font-family: 'Space Mono',monospace; font-size: 11px; color: var(--green);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: .75rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .hero-badge::before {
      content: ''; width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 8px var(--green);
      animation: blink 2s infinite; flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    h1 { font-size: clamp(2.4rem,6vw,3.8rem); font-weight: 700; line-height: 1.05; letter-spacing: -2px; margin-bottom: .4rem; }
    h1 .accent { color: var(--accent); }
    .hero-role { font-size: 1rem; color: var(--muted); font-weight: 300; margin-bottom: 1.1rem; }
    .hero-desc { font-size: .88rem; color: var(--muted); max-width: 520px; line-height: 1.85; margin-bottom: 1.75rem; }
    .hero-cta { display: flex; gap: .75rem; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .65rem 1.4rem; border-radius: 8px;
      font-size: .8rem; font-weight: 600; letter-spacing: .5px;
      text-decoration: none; transition: all .2s; cursor: pointer; border: none;
    }
    .btn-primary { background: var(--accent); color: #0a0c10; }
    .btn-primary:hover { background: #33ddff; transform: translateY(-2px); }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
    .hero-avatar {
      width: 130px; height: 130px; border-radius: 18px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 2.75rem; font-weight: 700; font-family: 'Space Mono',monospace; color: #fff;
      overflow: hidden;
    }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; padding-bottom: 4rem; }
    .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; text-align: center; transition: border-color .2s; }
    .stat-box:hover { border-color: var(--accent); }
    .stat-num { font-family: 'Space Mono',monospace; font-size: 2rem; font-weight: 700; color: var(--accent); line-height: 1; }
    .stat-label { font-size: .7rem; color: var(--muted); margin-top: .4rem; text-transform: uppercase; letter-spacing: 1px; }

    .skills-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: .75rem; }
    .skill-chip { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; display: flex; align-items: center; gap: .75rem; transition: border-color .2s,transform .15s; }
    .skill-chip:hover { border-color: var(--accent); transform: translateY(-2px); }
    .skill-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .skill-name { font-size: .82rem; font-weight: 600; }
    .skill-sub { font-size: .7rem; color: var(--muted); margin-top: .1rem; }

    .cert-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(165px,1fr)); gap: 1rem; }
    .cert-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 1.5rem 1rem; text-align: center; cursor: pointer;
      transition: border-color .2s,transform .15s;
    }
    .cert-card:hover { border-color: var(--accent2); transform: translateY(-3px); }
    .cert-badge {
      width: 50px; height: 50px; border-radius: 12px; margin: 0 auto .75rem;
      background: linear-gradient(135deg,rgba(124,58,237,.25),rgba(0,212,255,.15));
      border: 1px solid rgba(124,58,237,.35);
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
    }
    .cert-name { font-size: .85rem; font-weight: 600; margin-bottom: .2rem; }
    .cert-type { font-size: .7rem; color: var(--muted); margin-bottom: .4rem; }
    .cert-year { font-family: 'Space Mono',monospace; font-size: .65rem; color: var(--accent); }
    .cert-hint { font-size: .65rem; color: var(--accent2); margin-top: .6rem; opacity: 0; transition: opacity .2s; }
    .cert-card:hover .cert-hint { opacity: 1; }

    .exp-timeline { display: flex; flex-direction: column; gap: 1.25rem; }
    .exp-item { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 0 14px 14px 0; padding: 1.5rem; transition: border-color .2s; }
    .exp-item:hover { border-color: var(--accent); }
    .exp-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .35rem; flex-wrap: wrap; gap: .5rem; }
    .exp-role { font-size: .95rem; font-weight: 600; }
    .exp-year { font-family: 'Space Mono',monospace; font-size: .7rem; color: var(--accent); background: rgba(0,212,255,.1); padding: .25rem .7rem; border-radius: 999px; }
    .exp-company { font-size: .8rem; color: var(--muted); margin-bottom: .6rem; }
    .exp-desc { font-size: .8rem; color: var(--muted); line-height: 1.8; white-space: pre-line; }

    .project-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(290px,1fr)); gap: 1.25rem; }
    .project-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: border-color .2s,transform .2s; }
    .project-card:hover { border-color: var(--accent); transform: translateY(-4px); }
    .project-top-bar { height: 3px; background: linear-gradient(90deg,var(--accent2),var(--accent)); }
    .project-img { width: 100%; height: 180px; object-fit: cover; display: block; }
    .project-img-placeholder {
      width: 100%; height: 180px;
      background: linear-gradient(135deg,rgba(124,58,237,.18),rgba(0,212,255,.08));
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; border-bottom: 1px solid var(--border);
    }
    .project-body { padding: 1.4rem; }
    .project-tag { font-family: 'Space Mono',monospace; font-size: .65rem; color: var(--accent2); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: .5rem; }
    .project-title { font-size: .95rem; font-weight: 600; margin-bottom: .55rem; }
    .project-desc { font-size: .78rem; color: var(--muted); line-height: 1.8; margin-bottom: 1.1rem; white-space: pre-line; }
    .project-techs { display: flex; flex-wrap: wrap; gap: .4rem; }
    .tech-tag { font-size: .65rem; background: rgba(124,58,237,.15); color: #a78bfa; padding: .25rem .65rem; border-radius: 999px; border: 1px solid rgba(124,58,237,.3); }

    .contact-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(210px,1fr)); gap: 1rem; }
    .contact-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; display: flex; align-items: center; gap: 1rem; text-decoration: none; color: var(--text); transition: border-color .2s,transform .15s; }
    .contact-item:hover { border-color: var(--accent); transform: translateY(-2px); color: var(--accent); }
    .contact-icon { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; background: rgba(0,212,255,.08); border: 1px solid rgba(0,212,255,.2); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    .contact-label { font-size: .7rem; color: var(--muted); }
    .contact-value { font-size: .82rem; font-weight: 600; }

    footer { border-top: 1px solid var(--border); padding: 2rem 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .footer-text { font-family: 'Space Mono',monospace; font-size: .7rem; color: var(--muted); }
    .footer-links { display: flex; gap: 1.25rem; }
    .footer-links a { font-family: 'Space Mono',monospace; font-size: .7rem; color: var(--muted); text-decoration: none; transition: color .2s; }
    .footer-links a:hover { color: var(--accent); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,.78); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; padding: 1rem;
      opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      width: 100%; max-width: 700px; display: flex; flex-direction: column;
      transform: translateY(24px); transition: transform .25s; max-height: 90vh;
    }
    .modal-overlay.open .modal-box { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); gap: 1rem; }
    .modal-title { font-size: .95rem; font-weight: 600; }
    .modal-meta { font-size: .75rem; color: var(--muted); margin-top: .2rem; }
    .modal-close { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
    .modal-close:hover { border-color: var(--accent); color: var(--accent); }
    .modal-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; overflow: hidden; }
    .iframe-wrap { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: var(--surface); }
    .iframe-wrap iframe { width: 100%; height: 400px; border: none; display: block; }
    .modal-actions { display: flex; justify-content: center; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp .5s ease both; }
    .d1{animation-delay:.1s} .d2{animation-delay:.2s}

    @media(max-width:640px){
      .hero{grid-template-columns:1fr}
      .hero-avatar{display:none}
      .stats-row{grid-template-columns:repeat(2,1fr)}
      .nav-links{display:none}
    }
  </style>
</head>

      desc: `Implementasi kebijakan keamanan jaringan komprehensif: firewall
rules, IDS/IPS, network segmentation, dan audit keamanan rutin
untuk lingkungan enterprise.`,
      image: "images/project-security.jpg",
      tags: ["Firewall", "ACL", "IDS/IPS", "VLAN Segmentation"],
    },
    {
      category: "Wireless · UniFi",
      title: "Enterprise WiFi Deployment",
      desc: `Deployment jaringan WiFi enterprise menggunakan UniFi Controller
dengan centralized management, guest portal, roaming seamless
antar AP, dan capacity planning.`,
      image: "images/project-wifi.jpg",
      tags: ["UniFi", "WiFi 6", "Guest Portal", "Roaming"],
    },
  ],

};

</script>
<script>
(function () {
  var D = PORTFOLIO;

  // HERO
  document.title = D.profile.name + ' · ' + D.profile.title;
  document.querySelector('meta[name="description"]').content = 'Portfolio ' + D.profile.name;
  document.getElementById('nav-logo').textContent = D.profile.name + '.DEV';
  document.getElementById('hero-badge').textContent = D.profile.status;

  var mid = Math.ceil(D.profile.name.length / 2);
  document.getElementById('hero-name').innerHTML =
    D.profile.name.slice(0, mid) + '<span class="accent">' + D.profile.name.slice(mid) + '</span>';
  document.getElementById('hero-role').textContent = D.profile.title + ' · ' + D.profile.tagline;
  document.getElementById('hero-desc').textContent = D.profile.summary;

  var av = document.getElementById('hero-avatar');
  if (D.profile.avatarImage) {
    av.innerHTML = '<img src="' + D.profile.avatarImage + '" alt="Foto ' + D.profile.name + '" />';
  } else {
    av.textContent = D.profile.avatar;
  }

  // STATS
  document.getElementById('stats-row').innerHTML = D.stats.map(function (s) {
    return '<div class="stat-box"><div class="stat-num">' + s.num + '</div><div class="stat-label">' + s.label + '</div></div>';
  }).join('');

  // SKILLS
  document.getElementById('skills-grid').innerHTML = D.skills.map(function (s) {
    return '<div class="skill-chip"><div class="skill-dot" style="background:' + s.color + '"></div>' +
      '<div><div class="skill-name">' + s.name + '</div><div class="skill-sub">' + s.sub + '</div></div></div>';
  }).join('');

  // CERTS
  document.getElementById('cert-grid').innerHTML = D.certifications.map(function (c, i) {
    return '<div class="cert-card" onclick="openCert(' + i + ')" tabindex="0" role="button" ' +
      'onkeydown="if(event.key===\'Enter\'||event.key===\' \')openCert(' + i + ')">' +
      '<div class="cert-badge">' + c.icon + '</div>' +
      '<div class="cert-name">' + c.name + '</div>' +
      '<div class="cert-type">' + c.type + '</div>' +
      '<div class="cert-year">' + c.issuer + ' &middot; ' + c.year + '</div>' +
      '<div class="cert-hint">Klik untuk preview &rarr;</div>' +
      '</div>';
  }).join('');

  // EXPERIENCE
  document.getElementById('exp-timeline').innerHTML = D.experience.map(function (e) {
    return '<div class="exp-item">' +
      '<div class="exp-header"><div class="exp-role">' + e.role + '</div><div class="exp-year">' + e.period + '</div></div>' +
      '<div class="exp-company">' + e.company + ' &middot; ' + e.location + '</div>' +
      '<div class="exp-desc">' + e.desc + '</div></div>';
  }).join('');

  // PROJECTS
  var icons = ['🏢', '🔒', '📡', '📊', '🛡️', '📶'];
  document.getElementById('project-grid').innerHTML = D.projects.map(function (p, i) {
    var mediaHtml;
    if (p.image) {
      mediaHtml = '<img class="project-img" src="' + p.image + '" alt="' + p.title +
        '" onerror="this.outerHTML=\'<div class=&quot;project-img-placeholder&quot;>' + icons[i % icons.length] + '</div>\'" />';
    } else {
      mediaHtml = '<div class="project-img-placeholder">' + icons[i % icons.length] + '</div>';
    }
    return '<div class="project-card">' +
      '<div class="project-top-bar"></div>' + mediaHtml +
      '<div class="project-body">' +
      '<div class="project-tag">' + p.category + '</div>' +
      '<div class="project-title">' + p.title + '</div>' +
      '<div class="project-desc">' + p.desc + '</div>' +
      '<div class="project-techs">' + p.tags.map(function (t) {
        return '<span class="tech-tag">' + t + '</span>';
      }).join('') + '</div></div></div>';
  }).join('');

  // CONTACT
  var ct = D.contact;
  var items = [
    { href: 'mailto:' + ct.email, icon: '✉️', label: 'Email', value: ct.email },
    { href: ct.linkedin, icon: '💼', label: 'LinkedIn', value: 'Lihat profil LinkedIn' },
    { href: ct.github, icon: '⚡', label: 'GitHub', value: 'Lihat profil GitHub' },
    { href: ct.whatsapp, icon: '📱', label: 'WhatsApp', value: 'Chat via WhatsApp' }
  ];
  document.getElementById('contact-grid').innerHTML = items.map(function (ci) {
    return '<a href="' + ci.href + '" class="contact-item" target="_blank" rel="noopener">' +
      '<div class="contact-icon">' + ci.icon + '</div>' +
      '<div><div class="contact-label">' + ci.label + '</div>' +
      '<div class="contact-value">' + ci.value + '</div></div></a>';
  }).join('');

  // FOOTER
  var yr = new Date().getFullYear();
  document.getElementById('footer-text').textContent =
    '© ' + yr + ' ' + D.profile.name + ' · ' + D.profile.title + ' · ' + D.profile.location;
  document.getElementById('footer-links').innerHTML =
    '<a href="' + ct.github + '" target="_blank" rel="noopener">GitHub</a>' +
    '<a href="' + ct.linkedin + '" target="_blank" rel="noopener">LinkedIn</a>' +
    '<a href="mailto:' + ct.email + '">Email</a>';

  // MODAL SERTIFIKAT
  var modal  = document.getElementById('certModal');
  var mTitle = document.getElementById('mTitle');
  var mMeta  = document.getElementById('mMeta');
  var mFrame = document.getElementById('mFrame');
  var mLink  = document.getElementById('mLink');
  var mClose = document.getElementById('mClose');

  window.openCert = function (i) {
    var c = D.certifications[i];
    mTitle.textContent = c.name;
    mMeta.textContent  = c.issuer + ' · ' + c.type + ' · ' + c.year;
    mFrame.src = c.previewUrl;
    mLink.href = c.previewUrl;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  function closeCert() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(function () { mFrame.src = ''; }, 300);
  }

  mClose.addEventListener('click', closeCert);
  modal.addEventListener('click', function (e) { if (e.target === modal) closeCert(); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeCert(); });
}());
</script>
</body>
</html>
